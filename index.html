<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utsab Pandey Portfolio</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#1e3a8a,#2563eb,#38bdf8);
  color:#1f2937;
}

header{
  text-align:center;
  padding:50px 20px;
  color:white;
}

header h1{
  font-size:3rem;
  font-weight:700;
}

header p{
  margin-top:10px;
  opacity:0.9;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.section-title{
  font-size:1.8rem;
  color:white;
  margin:30px 0 10px;
}

.card{
  background:rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
  padding:20px;
  border-radius:20px;
  margin-bottom:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px) scale(1.01);
}

.grid{
  display:grid;
  gap:12px;
  margin-top:15px;
}

.grid-3{grid-template-columns: repeat(auto-fit,minmax(140px,1fr));}
.grid-2{grid-template-columns: repeat(auto-fit,minmax(200px,1fr));}

img,video{
  width:100%;
  border-radius:12px;
  transition:0.3s;
}

img:hover, video:hover{
  transform:scale(1.05);
}

.contact{
  text-align:center;
  font-weight:500;
}

.contact p{
  margin:8px 0;
}

footer{
  text-align:center;
  padding:20px;
  color:white;
  opacity:0.8;
}

@media(max-width:600px){
  header h1{font-size:2.2rem}
}
</style>
</head>

<h1>Utsab Pande
